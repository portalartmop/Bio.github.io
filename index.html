<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aperture Terminal</title>

<style>
body{
    margin:0;
    background:#000;
    color:#ff8c00;
    font-family:Consolas,monospace;
    overflow:hidden;
}

/* FLICKER */
body.flicker{
    animation:flicker .12s infinite;
}

@keyframes flicker{
    0%{opacity:1}
    20%{opacity:.9}
    40%{opacity:1}
    60%{opacity:.85}
    80%{opacity:1}
    100%{opacity:.95}
}

/* TERMINAL */
#terminal{
    padding:25px;
    white-space:pre-wrap;
    line-height:1.6;
    text-shadow:0 0 8px #ff8c00;
}

/* INPUT */
.input-line{
    display:flex;
}

.prompt{
    margin-right:10px;
    color:#ffb347;
}

input{
    background:none;
    border:none;
    outline:none;
    color:#ff8c00;
    font:inherit;
    width:100%;
}

/* CREDITS */
#credits{
    position:fixed;
    inset:0;
    background:black;
    color:white;
    font-family:Arial;
    text-align:center;
    padding-top:40vh;
    font-size:26px;
    animation:scroll 25s linear forwards;
    white-space:pre-line;
}

@keyframes scroll{
    from{transform:translateY(100vh);}
    to{transform:translateY(-120%);}
}

/* SHUTDOWN */
#shutdown{
    position:fixed;
    inset:0;
    background:black;
    color:#666;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Consolas;
    font-size:18px;
}
</style>
</head>

<body>

<audio id="bgm" loop muted>
    <source src="audio/audio.mp3" type="audio/mpeg">
</audio>

<div id="terminal"></div>

<script>

const terminal = document.getElementById("terminal");
const bgm = document.getElementById("bgm");

/* AUDIO AUTO START (browser-safe) */
let musicStarted = false;

function startMusic(){
    if(musicStarted) return;
    musicStarted = true;

    bgm.volume = 0.5;
    bgm.muted = false;

    bgm.play().catch(()=>{});
}

document.addEventListener("click", startMusic);
document.addEventListener("keydown", startMusic);
document.addEventListener("touchstart", startMusic);

/* TYPE SYSTEM */
function typeLine(text, speed=10){
return new Promise(resolve=>{
let i=0;
function step(){
if(i<text.length){
terminal.innerHTML+=text[i];
i++;
setTimeout(step,speed);
}else{
terminal.innerHTML+="\n";
resolve();
}
}
step();
});
}

/* BOOT */
async function boot(){

const intro=[
"APERTURE SCIENCE COMPUTER-AIDED ENRICHMENT CENTER",
"",
"[ OK ] Core Systems Online",
"[ OK ] AI Interface Active",
"[ OK ] Monitoring Systems Stable",
"",
"Type 'bio' or 'end'"
];

for(const line of intro){
await typeLine(line,8);
}

createInput();
}

/* INPUT */
function createInput(){

const row=document.createElement("div");
row.className="input-line";

row.innerHTML=`
<span class="prompt">aperture@facility:~$</span>
<input autofocus>
`;

terminal.appendChild(row);

const input=row.querySelector("input");
input.focus();

input.addEventListener("keydown",(e)=>{

startMusic(); // unlock audio on first input

if(e.key==="Enter"){

const cmd=input.value.trim().toLowerCase();
row.remove();
run(cmd);
}

});
}

/* COMMANDS */
async function run(cmd){

terminal.innerHTML+="aperture@facility:~$ "+cmd+"\n";

if(cmd==="bio"){

await typeLine(
`NAME: ARTEM
ROLE: DEVELOPER
STATUS: ACTIVE`,
8
);

createInput();
return;
}

if(cmd==="end"){
startCredits();
return;
}

await typeLine("unknown command",8);
createInput();
}

/* FLICKER */
function flicker(){
document.body.classList.add("flicker");
setTimeout(()=>document.body.classList.remove("flicker"),4000);
}
setInterval(flicker,12000);

/* CREDITS */
function startCredits(){

document.body.innerHTML=`
<div id="credits">
APERTURE SCIENCE

TEST COMPLETE

DEVELOPER
PORTALARTMOP

SYSTEM STATUS
ALL TESTS SUCCESSFUL

SPECIAL THANKS
GLaDOS
COMPANION CUBE
THE FACILITY

THIS WAS A TRIUMPH

HUGE SUCCESS

THE CAKE IS A LIE
</div>
`;

setTimeout(shutdown,24000);
}

/* SHUTDOWN */
function shutdown(){
document.body.innerHTML=`
<div id="shutdown">
SYSTEM SHUTDOWN COMPLETE<br>
SIGNAL LOST
</div>
`;
}

boot();

</script>

</body>
</html>
