<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aperture Terminal</title>

<style>
body{
    margin:0;
    background:#000;
    color:#ff8c00;
    font-family:Consolas,monospace;
    overflow:hidden;
}

/* FLICKER */
body.flicker{
    animation:flicker .12s infinite;
}

@keyframes flicker{
    0%{opacity:1}
    20%{opacity:.9}
    40%{opacity:1}
    60%{opacity:.85}
    80%{opacity:1}
    100%{opacity:.95}
}

/* LOGO CONTAINER - RIGHT SIDE */
#logo-container{
    position:fixed;
    top:50%;
    right:30px;
    transform:translateY(-50%);
    width:200px;
    height:auto;
    z-index:10;
    user-select:none;
    pointer-events:none;
}

#logo-svg{
    width:100%;
    height:auto;
    filter:drop-shadow(0 0 15px #ff8c00);
}

#logo-text{
    text-align:center;
    color:#ff8c00;
    font-size:14px;
    font-weight:bold;
    margin-top:10px;
    text-shadow:0 0 8px #ff8c00;
    letter-spacing:2px;
}

/* TERMINAL */
#terminal{
    padding:25px;
    padding-right:280px;
    white-space:pre-wrap;
    line-height:1.6;
    text-shadow:0 0 8px #ff8c00;
    min-height:100vh;
}

/* INPUT */
.input-line{
    display:flex;
}

.prompt{
    margin-right:10px;
    color:#ffb347;
}

input{
    background:none;
    border:none;
    outline:none;
    color:#ff8c00;
    font:inherit;
    width:100%;
}

input::placeholder{
    color:#ff8c00;
    opacity:0.5;
}

/* CREDITS */
#credits{
    position:fixed;
    inset:0;
    background:black;
    color:#ff8c00;
    font-family:Consolas,monospace;
    text-align:center;
    padding-top:40vh;
    font-size:26px;
    animation:scroll 25s linear forwards;
    white-space:pre-line;
}

@keyframes scroll{
    from{transform:translateY(100vh);}
    to{transform:translateY(-120%);}
}

/* SHUTDOWN */
#shutdown{
    position:fixed;
    inset:0;
    background:black;
    color:#ff8c00;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Consolas;
    font-size:18px;
}
</style>
</head>

<body>

<audio id="bgm" loop>
    <source src="./audio/audio.mp3" type="audio/mpeg">
</audio>

<div id="logo-container">
    <svg id="logo-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <!-- Outer circle -->
        <circle cx="100" cy="100" r="95" fill="none" stroke="#ff8c00" stroke-width="2"/>
        
        <!-- Inner circle -->
        <circle cx="100" cy="100" r="85" fill="none" stroke="#ff8c00" stroke-width="1"/>
        
        <!-- Core aperture circle -->
        <circle cx="100" cy="100" r="70" fill="none" stroke="#ff8c00" stroke-width="2"/>
        
        <!-- Aperture blades (8 segments) -->
        <g stroke="#ff8c00" stroke-width="2" fill="none">
            <line x1="100" y1="30" x2="100" y2="50"/>
            <line x1="100" y1="150" x2="100" y2="170"/>
            <line x1="30" y1="100" x2="50" y2="100"/>
            <line x1="150" y1="100" x2="170" y2="100"/>
            
            <!-- Diagonal blades -->
            <line x1="55" y1="55" x2="70" y2="70"/>
            <line x1="130" y1="130" x2="145" y2="145"/>
            <line x1="145" y1="55" x2="130" y2="70"/>
            <line x1="70" y1="130" x2="55" y2="145"/>
        </g>
        
        <!-- Center dot -->
        <circle cx="100" cy="100" r="4" fill="#ff8c00"/>
        
        <!-- Corner details -->
        <g stroke="#ff8c00" stroke-width="1.5" fill="none" opacity="0.8">
            <rect x="35" y="35" width="20" height="20"/>
            <rect x="145" y="35" width="20" height="20"/>
            <rect x="35" y="145" width="20" height="20"/>
            <rect x="145" y="145" width="20" height="20"/>
        </g>
    </svg>
    <div id="logo-text">APERTURE<br>SCIENCE</div>
</div>

<div id="terminal"></div>

<script>

const terminal = document.getElementById("terminal");
const logoContainer = document.getElementById("logo-container");
const bgm = document.getElementById("bgm");

/* AUDIO AUTO START (browser-safe) */
let musicStarted = false;

function startMusic(){
    if(musicStarted) return;
    musicStarted = true;

    bgm.volume = 0.5;
    bgm.muted = false;

    const playPromise = bgm.play();
    if (playPromise !== undefined) {
        playPromise.catch(error => {
            console.log("Audio playback failed:", error);
        });
    }
}

document.addEventListener("click", startMusic);
document.addEventListener("keydown", startMusic);
document.addEventListener("touchstart", startMusic);

/* TYPE SYSTEM */
function typeLine(text, speed=10){
    return new Promise(resolve=>{
        let i=0;
        function step(){
            if(i<text.length){
                terminal.innerHTML+=text[i];
                i++;
                setTimeout(step,speed);
            }else{
                terminal.innerHTML+="\n";
                resolve();
            }
        }
        step();
    });
}

/* BOOT */
async function boot(){

    const intro=[
        "APERTURE SCIENCE COMPUTER-AIDED ENRICHMENT CENTER",
        "",
        "----------------------------------------",
        "[ OK ] Core Systems Online",
        "[ OK ] AI Interface Active",
        "[ OK ] Monitoring Systems Stable",
        "",
        "----------------------------------------",
        "",
        "Type 'help' for available commands"
    ];

    for(const line of intro){
        await typeLine(line,8);
    }

    createInput();
}

/* INPUT */
function createInput(){

    const row=document.createElement("div");
    row.className="input-line";

    row.innerHTML=`
        <span class="prompt">aperture@facility:~$</span>
        <input autofocus placeholder="">
    `;

    terminal.appendChild(row);

    const input=row.querySelector("input");
    input.focus();

    input.addEventListener("keydown",(e)=>{

        startMusic(); // unlock audio on first input

        if(e.key==="Enter"){

            const cmd=input.value.trim().toLowerCase();
            row.remove();
            run(cmd);
        }

    });
}

/* COMMANDS */
async function run(cmd){

    terminal.innerHTML+="aperture@facility:~$ "+cmd+"\n";

    if(cmd==="bio"){
        await typeLine(
            `NAME: ARTEM
ROLE: DEVELOPER, PROGRAMIST
STATUS: ACTIVE`,
            8
        );
        createInput();
        return;
    }

    if(cmd==="help"){
        await typeLine(
            `COMMANDS LIST:
  bio        - Display developer information
  end        - Start credits sequence
  clear      - Clear terminal screen`,
            8
        );
        createInput();
        return;
    }

    if(cmd==="end"){
        startCredits();
        return;
    }

    if(cmd==="clear"){
        terminal.innerHTML="";
        createInput();
        return;
    }

    if(cmd===""){
        createInput();
        return;
    }

    await typeLine(`unknown command '${cmd}' - type 'help' for available commands`,8);
    createInput();
}

/* FLICKER */
function flicker(){
    document.body.classList.add("flicker");
    setTimeout(()=>document.body.classList.remove("flicker"),4000);
}
setInterval(flicker,12000);

/* CREDITS */
function startCredits(){

    document.body.innerHTML=`
    <div id="credits">
APERTURE SCIENCE 

TEST COMPLETE

DEVELOPER
PORTALARTMOP

SYSTEM STATUS
ALL TESTS SUCCESSFUL

SPECIAL THANKS
GLaDOS
COMPANION CUBE
THE FACILITY

THIS WAS A TRIUMPH

HUGE SUCCESS

THE CAKE IS A LIE
    </div>
    `;

    setTimeout(shutdown,24000);
}

/* SHUTDOWN */
function shutdown(){
    document.body.innerHTML=`
    <div id="shutdown">
SYSTEM SHUTDOWN COMPLETE<br>
SIGNAL LOST
    </div>
    `;
}

boot();

</script>

</body>
</html>
